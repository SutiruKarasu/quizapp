<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tatiana Lumos | Fashion Photography</title>
    <link rel="stylesheet" href="style.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Lato:wght@300;400&display=swap" rel="stylesheet">
</head>
<body>

    <!-- Edler Custom Cursor -->
    <div class="custom-cursor"></div>

    <!-- Navigation -->
    <nav class="navbar">
        <div class="logo">T. Lumos</div>
        <ul class="nav-links">
            <li><a href="#home" data-i18n="nav_home">Home</a></li>
            <li><a href="#about" data-i18n="nav_about">About</a></li>
            <li><a href="#portfolio" data-i18n="nav_portfolio">Portfolio</a></li>
            <li><a href="#contact" data-i18n="nav_contact">Contact</a></li>
        </ul>
        <div class="language-switcher">
            <select id="lang-select">
                <option value="en">EN</option>
                <option value="cs">CS</option>
                <option value="ru">RU</option>
            </select>
        </div>
    </nav>

    <!-- Hero Section -->
    <header id="home" class="hero">
        <div class="hero-content">
            <h1 data-i18n="hero_title">Tatiana Lumos</h1>
            <p data-i18n="hero_subtitle">Fashion Photography</p>
        </div>
    </header>

    <!-- About Section -->
    <section id="about" class="section">
        <h2 class="section-title" data-i18n="about_title">About Me</h2>
        <div class="about-content">
            <p data-i18n="about_text">Capturing elegance and style through the lens. Dedicated to flawless aesthetics.</p>
        </div>
    </section>

    <!-- Portfolio Section -->
    <section id="portfolio" class="section bg-light">
        <h2 class="section-title" data-i18n="portfolio_title">Portfolio</h2>
        <div class="album-grid">
            <!-- Album 1 -->
            <div class="album-card" onclick="openAlbum('spring')">
                <div class="album-cover" style="background-image: url('https://images.unsplash.com/photo-1490481651871-ab68de25d43d?w=500');"></div>
                <h3 data-i18n="album_spring">Spring Collection</h3>
            </div>
            <!-- Album 2 -->
            <div class="album-card" onclick="openAlbum('vogue')">
                <div class="album-cover" style="background-image: url('https://images.unsplash.com/photo-1515886657613-9f3515b0c78f?w=500');"></div>
                <h3 data-i18n="album_vogue">Vogue Editorials</h3>
            </div>
            <!-- Album 3 -->
            <div class="album-card" onclick="openAlbum('street')">
                <div class="album-cover" style="background-image: url('https://images.unsplash.com/photo-1529139574466-a303027c028b?w=500');"></div>
                <h3 data-i18n="album_street">Street Style</h3>
            </div>
        </div>
    </section>

    <!-- Contact Section -->
    <section id="contact" class="section">
        <h2 class="section-title" data-i18n="contact_title">Get in Touch</h2>
        <form class="contact-form" onsubmit="event.preventDefault();">
            <div class="form-group">
                <label for="name" data-i18n="form_name">Name</label>
                <input type="text" id="name" required>
            </div>
            <div class="form-group">
                <label for="email" data-i18n="form_email">Email</label>
                <input type="email" id="email" required>
            </div>
            <div class="form-group">
                <label for="phone" data-i18n="form_phone">Phone</label>
                <input type="tel" id="phone">
            </div>
            <div class="form-group">
                <label for="message" data-i18n="form_message">Message</label>
                <textarea id="message" rows="5" required></textarea>
            </div>
            <button type="submit" class="submit-btn" data-i18n="btn_send">Send Message</button>
        </form>
    </section>

    <!-- Modal für Alben (Pop-Up) -->
    <div id="album-modal" class="modal">
        <span class="close-modal" onclick="closeAlbum()">&times;</span>
        <div class="modal-content" id="modal-gallery">
            <!-- Bilder werden dynamisch injiziert -->
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
